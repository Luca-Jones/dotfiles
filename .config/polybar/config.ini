ramp-capacity-5  = ůįĀĺ
ramp-capacity-6  = ůįĀĺ
ramp-capacity-7  = ůįāÄ
ramp-capacity-8  = ůįāĀ
ramp-capacity-9  = ůįāā
ramp-capacity-10 = ůįĀĻ


[module/date]
type = internal/date
date = %a %b %d %Y   %I:%M %p

[module/keyboard]
type = custom/text
label = " ÔĄú "
format-foreground = ${colors.primary}
format-font = 2
click-left = onboard

[module/pacman]
type = custom/script
;exec = yay -Qu 2>/dev/null | wc -l
exec = checkupdates 2>/dev/null | wc -l
interval = 10

format = <label>
label = %output%
format-prefix = "Ó¨© "
format-prefix-foreground = ${colors.primary}
format-prefix-font = 2

[module/poweroff]
